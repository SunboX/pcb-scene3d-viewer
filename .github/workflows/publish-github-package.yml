name: Publish GitHub Package

on:
    release:
        types:
            - published
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: github-package-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: https://npm.pkg.github.com
                  scope: '@sunbox'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Test
              run: npm test

            - name: Check formatting
              run: npm run check:format

            - name: Publish GitHub Packages mirror
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"
                  npm pkg set name='@sunbox/pcb-scene3d-viewer'

                  if npm view "@sunbox/pcb-scene3d-viewer@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
                      echo "@sunbox/pcb-scene3d-viewer@${PACKAGE_VERSION} is already published"
                      exit 0
                  fi

                  npm publish --registry=https://npm.pkg.github.com
